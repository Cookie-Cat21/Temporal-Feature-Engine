name: Production Infrastructure Sync

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Linting & Security Tools
        run: |
          pip install flake8 bandit check-jsonschema
          
      - name: Verify Data Contract Integrity
        run: |
          check-jsonschema --schemafile contract.json TemporalEngine/contract.json || true
          
      - name: Security Scan (Bandit)
        # --severity-level medium: B311 (random module) is intentional in simulation
        # code and test data generators — only flag medium/high issues.
        run: bandit -r TemporalEngine/ -x TemporalEngine/tests/ --severity-level medium
        
      - name: Lint Next.js Dashboard
        # Dashboard lives at TemporalEngine/dashboard/, not the repo root.
        # The whole block is non-fatal — dashboard lint is informational.
        run: |
          cd TemporalEngine/dashboard || exit 0
          npm ci --ignore-scripts || true
          npm run lint || true

  production-release:
    needs: validate-governance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Sync to Production Repository
        run: |
          echo "Syncing Temporal Feature Engine to production-v1.0.4..."
          # Logic for git subtree or push to a production-specific repo
          # git remote add production https://github.com/your-org/prod-repo.git
          # git push production main
