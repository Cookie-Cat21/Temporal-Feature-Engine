name: Tests

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: TemporalEngine/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest faker redis duckdb \
            presidio-analyzer presidio-anonymizer spacy \
            python-dotenv prometheus_client pandas pyarrow \
            langchain langchain-core langchain-openai langgraph neo4j

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Run streaming logic tests (no Flink cluster needed)
        working-directory: TemporalEngine
        run: python -m pytest test_streaming.py -v --tb=short

      - name: Run PII shield tests
        working-directory: TemporalEngine
        run: python -m pytest test_pii.py -v --tb=short

      - name: Run sovereignty tests
        working-directory: TemporalEngine
        run: python -m pytest test_sovereignty.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint TemporalEngine
        run: ruff check TemporalEngine/ --select E,F,W --ignore E501,F401
