name: Tests

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: TemporalEngine/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # `click` is added explicitly because the spaCy CLI imports it but
          # newer pip resolvers do not always pull it transitively from spaCy's
          # typer dependency.
          pip install pytest faker redis duckdb click \
            presidio-analyzer presidio-anonymizer "spacy>=3,<4" \
            python-dotenv prometheus_client pandas pyarrow \
            langchain langchain-core langchain-openai langgraph neo4j \
            networkx

      - name: Download spaCy model
        # en_core_web_sm is ~12 MB vs en_core_web_lg ~750 MB — sufficient for
        # Presidio NER in CI and avoids timeout on the large model download.
        run: python -m spacy download en_core_web_sm

      - name: Run streaming logic tests (no Flink cluster needed)
        working-directory: TemporalEngine
        run: python -m pytest test_streaming.py -v --tb=short

      - name: Run PII shield tests
        working-directory: TemporalEngine
        run: python -m pytest test_pii.py -v --tb=short

      - name: Run sovereignty tests
        working-directory: TemporalEngine
        run: python -m pytest test_sovereignty.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint TemporalEngine
        run: ruff check TemporalEngine/ --select E,F,W --ignore E501,F401
