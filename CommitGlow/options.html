<!DOCTYPE html>
<html>
<head>
    <title>CommitGlow Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 30px;
            max-width: 400px;
            margin: auto;
        }
        h1 {
            color: #238636;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #58a6ff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }
        button {
            background: #238636;
            color: #ffffff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background: #2ea043;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>🌿 CommitGlow</h1>
    <div class="form-group">
        <label for="username">GitHub Username</label>
        <input type="text" id="username" placeholder="e.g. ovindu">
    </div>
    <button id="save">Save Preferences</button>
    <div id="status" class="status">Saved successfully!</div>

    <script src="options.js"></script>
</body>
</html>
