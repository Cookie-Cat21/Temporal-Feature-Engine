<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommitGlow Dashboard</title>
    <link rel="stylesheet" href="lib/github-calendar-responsive.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="bg-body">
    <!-- Premium Stats Header -->
    <header class="stats-header">
        <div class="stat-item">
            <span class="stat-value" id="stat-trackers">14,281</span>
            <span class="stat-label">Privacy Blocks</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-bandwidth">1.4 GB</span>
            <span class="stat-label">Data Saved</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-time">12 min</span>
            <span class="stat-label">Focus Time</span>
        </div>
    </header>

    <!-- Central Hero (Clock & Search) -->
    <main class="hero">
        <div id="clock">00:00</div>
        <div id="date">JANUARY 1, 2026</div>
        
        <form action="https://www.google.com/search" method="GET" class="search-container">
            <div class="search-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </div>
            <input type="text" name="q" placeholder="Search Google..." autocomplete="off">
        </form>
    </main>

    <!-- The Glow Widget -->
    <aside id="commit-glow-widget"></aside>

    <footer style="position: absolute; bottom: 20px; left: 50px; z-index: 10; font-size: 10px; color: #8b949e; letter-spacing: 1px; text-transform: uppercase;">
        Powered by CommitGlow 🌿
    </footer>

    <script src="lib/github-calendar.min.js"></script>
    <script src="newtab.js"></script>
</body>
</html>
